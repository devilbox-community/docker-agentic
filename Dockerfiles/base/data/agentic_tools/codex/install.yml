---

check: codex --version 2>&1 | grep -qE '[0-9]+\.[0-9]+'

all:
  type: custom
  command: "mkdir -p /opt/agentic-tools/codex/bin && if curl -fsI https://chatgpt.com/codex/install.sh >/dev/null 2>&1; then curl -fsSL https://chatgpt.com/codex/install.sh | sh && for p in $(command -v codex 2>/dev/null) /root/.codex/bin/codex /root/.local/bin/codex /usr/local/bin/codex; do [ -x \"$p\" ] && install -D -m 0755 \"$p\" /opt/agentic-tools/codex/bin/codex && break; done; else echo 'WARN: codex primary probe failed; skipping (no npm fallback per user mandate)' >&2; fi"
  package: "@openai/codex"
  binary: codex
  version:
  build_dep: []
  run_dep: []
  pre:
  post:
