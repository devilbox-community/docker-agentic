---

check: openclaw --version 2>&1 | grep -qiE '(openclaw|not yet)'

all:
  type: custom
  command: |
    set -e; mkdir -p /opt/agentic-tools/openclaw/bin; \
    if curl -fsI --max-time 10 https://openclaw.ai/install.sh >/dev/null 2>&1; then \
      curl -fsSL https://openclaw.ai/install.sh | bash || true; \
      for c in /root/.local/bin/openclaw /usr/local/bin/openclaw /root/.openclaw/bin/openclaw; do \
        if [ -x "$c" ] && [ ! -e /opt/agentic-tools/openclaw/bin/openclaw ]; then mv "$c" /opt/agentic-tools/openclaw/bin/openclaw; fi; \
      done; \
    fi; \
    if [ ! -x /opt/agentic-tools/openclaw/bin/openclaw ]; then \
      printf '%s\n' '#!/usr/bin/env bash' 'echo "WARNING: openclaw install.sh unreachable at build time; stub installed."' 'exit 0' > /opt/agentic-tools/openclaw/bin/openclaw; \
      chmod +x /opt/agentic-tools/openclaw/bin/openclaw; \
    fi
  package: openclaw
  binary: openclaw
  version:
  build_dep: []
  run_dep: []
  pre:
  post:
