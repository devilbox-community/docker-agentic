---

check: kiro-cli --version 2>&1 | grep -qiE '(kiro|[0-9]+\.[0-9]+)'

all:
  type: custom
  command: |
    mkdir -p /opt/agentic-tools/kiro/bin;
    wget https://desktop-release.q.us-east-1.amazonaws.com/latest/kiro-cli.deb -O /tmp/kiro-cli.deb;
    dpkg -i /tmp/kiro-cli.deb;
    apt-get install -f -y;
    install -D -m 0755 "$(which kiro-cli)" /opt/agentic-tools/kiro/bin/kiro-cli;
    test -x /opt/agentic-tools/kiro/bin/kiro-cli
  package: kiro-cli
  binary: kiro-cli
  version:
  build_dep: [libayatana-appindicator3-1, libwebkit2gtk-4.1-0, libgtk-3-0]
  run_dep: [libayatana-appindicator3-1, libwebkit2gtk-4.1-0, libgtk-3-0]
  pre:
  post:
