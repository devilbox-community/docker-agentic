---

check: copilot --version 2>&1 | grep -qE '[0-9]+\.[0-9]+'

all:
  type: custom
  command: |
    mkdir -p /opt/agentic-tools/copilot/bin;
    PREFIX="${HOME}/.local" curl -fsSL https://gh.io/copilot-install | bash;
    install -D -m 0755 "${HOME}/.local/bin/copilot" /opt/agentic-tools/copilot/bin/copilot;
    test -x /opt/agentic-tools/copilot/bin/copilot
  package: copilot
  binary: copilot
  version:
  build_dep: []
  run_dep: []
  pre:
  post:
