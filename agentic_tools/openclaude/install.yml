---

check: openclaude --version 2>&1 | grep -qE '[0-9]+\.[0-9]+'

all:
  type: custom
  command: |
    mkdir -p /opt/agentic-tools/openclaude/bin;
    npm install -g --prefix /opt/agentic-tools/openclaude @gitlawb/openclaude@0.16.1;
    test -x /opt/agentic-tools/openclaude/bin/openclaude;
    chmod +x /opt/agentic-tools/openclaude/bin/openclaude
  package: "@gitlawb/openclaude"
  binary: openclaude
  version: 0.16.1
  build_dep:
    - ripgrep
  run_dep: []
  pre:
  post:
