---

check: continue --version 2>&1 | grep -iE '[0-9]+\.[0-9]+' || (continue --version; false)

all:
  type: custom
  command: "mkdir -p /opt/agentic-tools/continue/bin && if curl -fsI https://continue.dev/install.sh >/dev/null 2>&1; then curl -fsSL https://continue.dev/install.sh | bash && for p in $(command -v continue 2>/dev/null) /root/.continue/bin/continue /root/.local/bin/continue /usr/local/bin/continue; do [ -x \"$p\" ] && install -D -m 0755 \"$p\" /opt/agentic-tools/continue/bin/continue && break; done; else echo 'WARN: continue primary probe failed; skipping (no npm fallback per user mandate)' >&2; fi"
  package: "@continuedev/cli"
  binary: continue
  version:
  build_dep: []
  run_dep: []
  pre:
  post:
