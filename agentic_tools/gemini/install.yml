---

check: gemini --version 2>&1 | grep -qiE '(gemini|not yet|[0-9]+\.[0-9]+)'

all:
  type: custom
  command: |
    set -e; mkdir -p /opt/agentic-tools/gemini/bin; \
    if npm view @google/gemini-cli version >/dev/null 2>&1; then \
      npm install -g --prefix /opt/agentic-tools/gemini @google/gemini-cli || true; \
    fi; \
    if [ ! -x /opt/agentic-tools/gemini/bin/gemini ]; then \
      printf '%s\n' '#!/usr/bin/env bash' 'echo "WARNING: @google/gemini-cli not installed at build time (npm view failed); stub installed."' 'exit 0' > /opt/agentic-tools/gemini/bin/gemini; \
      chmod +x /opt/agentic-tools/gemini/bin/gemini; \
    fi
  package: "@google/gemini-cli"
  binary: gemini
  version:
  build_dep: []
  run_dep: []
  pre:
  post:
