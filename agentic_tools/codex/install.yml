---

check: codex --version 2>&1 | grep -qE '[0-9]+\.[0-9]+'

all:
  type: custom
  command: |
    mkdir -p /opt/agentic-tools/codex/bin;
    curl -fsSL https://chatgpt.com/codex/install.sh | CODEX_NON_INTERACTIVE=1 sh;
    install -D -m 0755 "${HOME}/.local/bin/codex" /opt/agentic-tools/codex/bin/codex;
    test -x /opt/agentic-tools/codex/bin/codex
  package: codex
  binary: codex
  version:
  build_dep: []
  run_dep: []
  pre:
  post:
