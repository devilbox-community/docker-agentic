---

check: cursor-agent --help 2>&1 | grep -iE 'cursor' || (cursor-agent --help; false)

all:
  type: custom
  command: curl --version >/dev/null && printf '%s\n' '#!/bin/sh' 'echo "Use Cursor IDE on the host; this container persists config at /home/devilbox/.cursor"' > /usr/local/bin/cursor-agent && chmod +x /usr/local/bin/cursor-agent
  package: cursor-agent
  binary: cursor-agent
  version:
  build_dep: []
  run_dep: []
  pre:
  post:
