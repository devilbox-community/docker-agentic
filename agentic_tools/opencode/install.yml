---

check: opencode --version 2>&1 | grep -qE '[0-9]+\.[0-9]+'

all:
  type: custom
  command: "mkdir -p /opt/agentic-tools/opencode/bin && if curl -fsI https://opencode.ai/install >/dev/null 2>&1; then curl -fsSL https://opencode.ai/install | bash && for p in $(command -v opencode 2>/dev/null) /root/.opencode/bin/opencode /root/.local/bin/opencode /usr/local/bin/opencode; do [ -x \"$p\" ] && install -D -m 0755 \"$p\" /opt/agentic-tools/opencode/bin/opencode && break; done; else echo 'WARN: opencode primary probe failed; skipping (no npm fallback per user mandate)' >&2; fi"
  package: opencode-ai
  binary: opencode
  version:
  build_dep: []
  run_dep: []
  pre:
  post:
