---

# The name of the module
name: multica

default_enabled: false

# Default-toggle status for Wave 8D runtime symlinker.
# multica is OFF by default — full compose stack lands in Wave 8F1 and requires
# the sibling repo to be present at build time.
enabled_by_default: false

# Agentic image has no per-language axis; keep empty.
exclude: []

# In order for this tool to build/install correctly,
# the following tools must have been installed first.
depends: []
