---

check: qodercli --version 2>&1 | grep -qE '[0-9]+\.[0-9]+'

all:
  type: custom
  command: |
    mkdir -p /opt/agentic-tools/qoder/bin;
    curl -fsSL https://qoder.com/install | bash -s -- --force;
    install -D -m 0755 "$(command -v qodercli)" /opt/agentic-tools/qoder/bin/qodercli;
    test -x /opt/agentic-tools/qoder/bin/qodercli
  package: "@qoder-ai/qodercli"
  binary: qodercli
  version:
  build_dep: []
  run_dep: []
  pre:
  post:
