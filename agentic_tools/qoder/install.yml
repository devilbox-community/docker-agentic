---

check: qodercli --version 2>&1 | grep -qE '[0-9]+\.[0-9]+'

all:
  type: custom
  command: |
    mkdir -p /opt/agentic-tools/qoder/bin;
    version="1.0.11";
    arch="$(uname -m)";
    case "$arch" in x86_64) file="qodercli-linux-x64.tar.gz" ;; aarch64) file="qodercli-linux-arm64.tar.gz" ;; *) echo "Unsupported architecture: $arch" >&2; exit 1 ;; esac;
    tmpdir="$(mktemp -d)";
    trap 'rm -rf "$tmpdir"' EXIT;
    curl -fsSL --retry 3 "https://qoder-ide.oss-accelerate.aliyuncs.com/qodercli/releases/${version}/${file}" -o "$tmpdir/$file";
    tar -xzf "$tmpdir/$file" -C "$tmpdir";
    find "$tmpdir" -type f -name qodercli -perm -111 -exec install -D -m 0755 {} /opt/agentic-tools/qoder/bin/qodercli \; -quit;
    test -x /opt/agentic-tools/qoder/bin/qodercli
  package: "@qoder-ai/qodercli"
  binary: qodercli
  version: 1.0.11
  build_dep: []
  run_dep: []
  pre:
  post:
