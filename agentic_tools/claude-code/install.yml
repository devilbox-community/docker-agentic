---

check: claude --version 2>&1 | grep -qE '[0-9]+\.[0-9]+'

all:
  type: custom
  command: >-
    mkdir -p /opt/agentic-tools/claude-code/bin;
    if curl -fsI https://claude.ai/install.sh >/dev/null 2>&1; then
      curl -fsSL https://claude.ai/install.sh | bash;
      for p in $(command -v claude 2>/dev/null) /root/.local/bin/claude /root/.claude/local/claude /usr/local/bin/claude; do
        [ -x "$p" ] && install -D -m 0755 "$p" /opt/agentic-tools/claude-code/bin/claude && break;
      done;
    else
      echo 'WARN: claude-code primary probe failed; skipping (no npm fallback per user mandate)' >&2;
    fi
  package: "@anthropic-ai/claude-code"
  binary: claude
  version:
  build_dep: []
  run_dep: []
  pre:
  post:
