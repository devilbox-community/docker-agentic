---

check: qwen --version 2>&1 | grep -iE '[0-9]+\.[0-9]+' || (qwen --version; false)

all:
  type: custom
  command: |
    mkdir -p /opt/agentic-tools/qwen-code/bin;
    bash -c "$(curl -fsSL https://qwen-code-assets.oss-cn-hangzhou.aliyuncs.com/installation/install-qwen.sh)" -s --source qwenchat;
    install -D -m 0755 "$(command -v qwen)" /opt/agentic-tools/qwen-code/bin/qwen;
    test -x /opt/agentic-tools/qwen-code/bin/qwen
  package: qwen-code
  binary: qwen
  version:
  build_dep: []
  run_dep: []
  pre:
  post:
