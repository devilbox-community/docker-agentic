---

check: codewhale --version && codewhale-tui --version

all:
  type: custom
  command: |
    npm install -g codewhale;
    mkdir -p /opt/agentic-tools/codewhale/bin;
    install -D -m 0755 "$(command -v codewhale)" /opt/agentic-tools/codewhale/bin/codewhale;
    install -D -m 0755 "$(command -v codewhale-tui)" /opt/agentic-tools/codewhale/bin/codewhale-tui;
    test -x /opt/agentic-tools/codewhale/bin/codewhale;
    test -x /opt/agentic-tools/codewhale/bin/codewhale-tui
  package: codewhale
  binary: codewhale
  version:
  build_dep: []
  run_dep: []
  pre:
  post:
