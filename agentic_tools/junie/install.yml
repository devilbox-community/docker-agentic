---

check: junie --version 2>&1 | grep -qE '[0-9]+\.[0-9]+'

all:
  type: custom
  command: |
    mkdir -p /opt/agentic-tools/junie/bin;
    version="1831.31";
    arch="$(uname -m)";
    case "$arch" in x86_64) platform="linux-amd64"; sha="63074d074dfab2426306743e3fa8983d703cdc4f7b4257354aecbce66bc9b034" ;; aarch64) platform="linux-aarch64"; sha="7540130d9fe8d7343acb182fb3bad3aa09805e883f68b2a5ad6dcfe4c2792bb0" ;; *) echo "Unsupported architecture: $arch" >&2; exit 1 ;; esac;
    tmpzip="/tmp/junie-${version}.zip";
    url="https://github.com/JetBrains/junie/releases/download/${version}/junie-release-${version}-${platform}.zip";
    curl -fSL -o "$tmpzip" "$url";
    echo "${sha}  $tmpzip" | sha256sum -c -;
    install_dir="/opt/agentic-tools/junie/data/versions/${version}";
    mkdir -p "$install_dir";
    unzip -q -o "$tmpzip" -d "$install_dir";
    rm -f "$tmpzip";
    ln -sfn "$install_dir/junie/bin/junie" /opt/agentic-tools/junie/bin/junie;
    chmod +x /opt/agentic-tools/junie/bin/junie;
    test -x /opt/agentic-tools/junie/bin/junie
  package: junie
  binary: junie
  version: 1831.31
  build_dep: []
  run_dep: []
  pre:
  post:
