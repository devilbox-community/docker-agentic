---

check: aider --version 2>&1 | grep -qE '[0-9]+\.[0-9]+'

all:
  type: custom
  command: |
    uv tool install aider-chat --python 3.12;
    mkdir -p /opt/agentic-tools/aider/bin;
    install -D -m 0755 "${HOME}/.local/bin/aider" /opt/agentic-tools/aider/bin/aider;
    test -x /opt/agentic-tools/aider/bin/aider
  package: aider-chat
  binary: aider
  version:
  build_dep: []
  run_dep: []
  pre:
  post:
