---
name: Release Drafter

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: google-github-actions/release-please-action@v4
        id: release-please
        with:
          skip-github-release: true

      - uses: release-drafter/release-drafter@v6
        id: draft
        with:
          publish: false
          disable-autolabeler: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');

            // --- 1. Get commits since last tag ---
            let lastTag = '';
            try {
              lastTag = execSync('git describe --tags --abbrev=0 2>/dev/null', { encoding: 'utf8' }).trim();
            } catch { /* no tags yet */ }

            const range = lastTag ? `${lastTag}..HEAD` : 'HEAD';
            const log = execSync(`git log ${range} --no-merges --format="%s"`, { encoding: 'utf8' });
            const commits = log.split('\n').filter(Boolean);

            if (!commits.length) {
              console.log('No commits found since last tag. Skipping body update.');
              return;
            }

            // --- 2. Categorize commits by conventional commit type ---
            const sections = {
              '🚀 Features': [],
              '🐛 Bug Fixes': [],
              '📚 Documentation': [],
              '🔧 CI/CD': [],
              '♻️ Code Refactoring': [],
              '✅ Tests': [],
              '🧰 Maintenance': [],
            };

            const typeMap = {
              feat: '🚀 Features',
              feature: '🚀 Features',
              fix: '🐛 Bug Fixes',
              docs: '📚 Documentation',
              ci: '🔧 CI/CD',
              refactor: '♻️ Code Refactoring',
              test: '✅ Tests',
              tests: '✅ Tests',
              chore: '🧰 Maintenance',
              build: '🧰 Maintenance',
              style: '🧰 Maintenance',
              perf: '🚀 Features',
              revert: '⏪ Reverts',
            };

            for (const msg of commits) {
              const match = msg.match(/^(\w+)(\([^)]+\))?[!:]?\s*(.+)/);
              if (!match) {
                sections['🧰 Maintenance'].push(msg);
                continue;
              }
              const [, type, scope, desc] = match;
              const section = typeMap[type] || '🧰 Maintenance';
              const isBreaking = /!:\s|BREAKING CHANGE/.test(msg);
              const prefix = isBreaking ? '💥 ' : '';
              const scopeSuffix = scope ? ` (**${scope.slice(1, -1)}**)` : '';
              sections[section].push(`${prefix}${desc}${scopeSuffix}`);
            }

            // --- 3. Build changelog markdown ---
            let body = '## Changes\n\n';
            for (const [title, items] of Object.entries(sections)) {
              if (items.length === 0) continue;
              body += `### ${title}\n\n`;
              for (const item of items) {
                body += `- ${item}\n`;
              }
              body += '\n';
            }

            // --- 4. Find & update the draft release ---
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 5,
            });

            const draft = releases.find(r => r.draft);
            if (!draft) {
              console.log('No draft release found. Skipping body update.');
              return;
            }

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: draft.id,
              body,
            });

            console.log(`✅ Updated draft release "${draft.name}" with commit-based changelog (${commits.length} commits)`);
