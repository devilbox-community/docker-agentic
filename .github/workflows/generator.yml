---

# -------------------------------------------------------------------------------------------------
# Job Name
# -------------------------------------------------------------------------------------------------
name: generator


# -------------------------------------------------------------------------------------------------
# When to run
# -------------------------------------------------------------------------------------------------
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.ansible/**'
      - '.github/workflows/action.yml'
      - '.github/workflows/params.yml'
      - 'Dockerfiles/**'
      - 'agentic_tools/**'
      - 'bin/**'
      - 'tests/**'
      - 'Makefile'
      - '!**.md'
      - '!.ansible/ansible.cfg'


# -------------------------------------------------------------------------------------------------
# What to run
# -------------------------------------------------------------------------------------------------
jobs:
  generator:
    name: "Generator"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Bootstrap external Makefiles
        run: |
          make Makefile.docker Makefile.lint

      - name: Diff generated Docker files
        run: |
          make gen-dockerfiles
          git diff --quiet || { echo "Build Changes"; git diff; git status; false; }
