---

# -------------------------------------------------------------------------------------------------
# Job Name
# -------------------------------------------------------------------------------------------------
name: lint


# -------------------------------------------------------------------------------------------------
# When to run
# -------------------------------------------------------------------------------------------------
on:
  workflow_dispatch:
  pull_request:


# -------------------------------------------------------------------------------------------------
# What to run
# -------------------------------------------------------------------------------------------------
jobs:
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bootstrap external Makefiles
        run: |
          make Makefile.docker Makefile.lint

      - name: Install yamllint
        run: |
          pip install --user yamllint

      - name: Lint YAML
        run: |
          make lint-yaml-local

      - name: Lint Changelog
        run: |
          make lint-changelog
